name: dont_shit_your_pants
description: "Don't Shit Your Pants - Android port of the classic Flash game."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/
    - assets/scenes/

  fonts:
    - family: Uni05
      fonts:
        - asset: assets/fonts/uni05_53.ttf
    - family: ArialBlack
      fonts:
        - asset: assets/fonts/arial_black.ttf
