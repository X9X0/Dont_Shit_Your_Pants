plugins {
    id 'com.android.application'
}

android {
    namespace 'io.junkbin.dontshityourpants'
    compileSdk 34

    defaultConfig {
        applicationId "io.junkbin.dontshityourpants"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
